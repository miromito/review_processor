{% extends "base.html" %}
{% block content %}
<div class="page-hero page-toolbar">
  <div>
    <h1 class="page-title mb-0">Проекты</h1>
  </div>
  <a class="btn btn-primary" href="/projects/new" aria-label="Создать новый проект">Новый проект</a>
</div>
<div
  class="toast-container position-fixed top-0 end-0 p-3"
  id="raProjectsToastWrap"
  style="z-index: 1080"
  aria-label="Всплывающие уведомления"
>
  <div
    id="raProjectsToast"
    class="toast align-items-center text-bg-success border-0"
    role="status"
    data-bs-autohide="true"
    data-bs-delay="5000"
    aria-atomic="true"
  >
    <div class="d-flex">
      <div class="toast-body" id="raProjectsToastBody" aria-label="Текст уведомления"></div>
      <button
        type="button"
        class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast"
        aria-label="Закрыть"
      ></button>
    </div>
  </div>
</div>
<div id="projectsSearchWrap" class="projects-search mb-3 d-none">
  <label for="projectSearch" class="visually-hidden">Поиск проектов по названию</label>
  <input type="search" id="projectSearch" class="form-control" placeholder="Поиск по названию…" autocomplete="off"
         aria-label="Поиск проектов по названию">
</div>
<div id="listAlert" class="mb-3" role="status" aria-live="polite"></div>
<div class="d-md-none">
  <div class="list-group shadow-sm" id="projectsListMobile" aria-label="Список проектов (мобильный)"></div>
</div>
<div class="table-responsive d-none d-md-block">
  <table class="table table-hover ra-data-table align-middle mb-0" aria-label="Список проектов">
    <thead class="table-light">
      <tr>
        <th scope="col">Название</th>
        <th scope="col" class="ra-project-col-status text-center">Статус</th>
        <th scope="col">Файл</th>
        <th scope="col">Строк</th>
        <th scope="col">Обновлён</th>
        <th scope="col" class="text-end"><span class="visually-hidden">Меню</span></th>
      </tr>
    </thead>
    <tbody id="projectsBody"></tbody>
  </table>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/projects_list.js" defer></script>
{% endblock %}
