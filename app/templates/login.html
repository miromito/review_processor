{% extends "base.html" %}
{% block content %}
<div class="narrow-form mx-auto">
  <h1 class="page-title mb-3">Вход</h1>
  <p class="text-muted small mb-3">Введите логин и пароль из настроек сервера (переменные окружения).</p>
  <form id="loginForm" class="card" novalidate>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label" for="loginUsername">Логин</label>
        <input class="form-control" type="text" id="loginUsername" name="username" required autocomplete="username"
               aria-label="Логин">
      </div>
      <div class="mb-3">
        <label class="form-label" for="loginPassword">Пароль</label>
        <input class="form-control" type="password" id="loginPassword" name="password" required autocomplete="current-password"
               aria-label="Пароль">
      </div>
      <button type="submit" class="btn btn-primary" aria-label="Войти в приложение">Войти</button>
      <div id="loginAlert" class="mt-3" role="status"></div>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/login.js" defer></script>
{% endblock %}
